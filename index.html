<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BelegScan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070707; --card:#0e0e0e; --br:#252525; --gold:#c8a45a; --txt:#ebebeb; --txt2:#787878;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); 
  margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

#app { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
.view { display: none; }
.view.on { display: block; }

/* FIX: Saubere Schrift für Auswertungen */
.card { background: var(--card); border: 1px solid var(--br); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
.lbl { font-size: 10px; color: var(--txt2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.v-fix { font-family: 'Inter', sans-serif !important; font-size: 32px; font-weight: 200; letter-spacing: -1px; }

.btn { 
  background: #161616; color: var(--txt); border: 1px solid var(--br); 
  padding: 14px; border-radius: 12px; width: 100%; font-size: 14px; cursor: pointer; margin-top: 10px;
}
.btn-primary { background: var(--gold); color: #000; font-weight: 500; border: none; }

#video { width: 100%; border-radius: 15px; background: #000; }
#canvas { display: none; }

nav { 
  position: fixed; bottom: 0; width: 100%; background: rgba(7,7,7,0.8); 
  backdrop-filter: blur(20px); border-top: 1px solid var(--br); display: flex; 
  justify-content: space-around; padding: 15px 0 calc(15px + env(safe-area-inset-bottom));
}
.nav-btn { color: var(--txt2); text-decoration: none; font-size: 11px; text-align: center; }
.nav-btn.active { color: var(--gold); }

/* Belegliste Style */
.receipt-item { border-bottom: 1px solid var(--br); padding: 12px 0; }
.receipt-item:last-child { border: none; }
</style>
</head>
<body>

<div id="app">
  <div class="view on" id="view-home">
    <div class="card">
      <div class="lbl">Aktuelle MwSt-Zahllast</div>
      <div class="v-fix" id="total-tax">0,00 €</div>
    </div>
    <div class="card">
      <div class="lbl">Verwaltung</div>
      <button class="btn" onclick="exportCSV()">📊 Export als CSV</button>
      <button class="btn" onclick="clearData()" style="color:#b83838">🗑 Daten löschen</button>
    </div>
  </div>

  <div class="view" id="view-scan">
    <div class="card">
      <video id="video" autoplay playsinline></video>
      <div id="status" style="text-align:center; margin: 10px 0; font-size:12px; color:var(--gold);">Kamera bereit</div>
      <button class="btn btn-primary" onclick="takePhoto()">📸 Foto & KI-Analyse</button>
    </div>
  </div>

  <div class="view" id="view-list">
    <div class="card">
        <div class="lbl">Alle Belege</div>
        <div id="receipt-list"></div>
    </div>
  </div>
</div>

<nav>
  <a href="#" class="nav-btn active" onclick="showView('view-home', this)">🏠<br>Home</a>
  <a href="#" class="nav-btn" onclick="showView('view-scan', this)">📷<br>Scan</a>
  <a href="#" class="nav-btn" onclick="showView('view-list', this)">📄<br>Belege</a>
</nav>

<canvas id="canvas"></canvas>

<script>
const API_KEY = "AIzaSyDvKQY4MIL0P6OatF2TdL7-u4vHuuAFnSU"; 

let receipts = JSON.parse(localStorage.getItem('dripsi_receipts')) || [];

function showView(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('on');
  if(el) el.classList.add('active');
  if(id === 'view-scan') startCamera();
  render();
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('video').srcObject = stream;
  } catch (e) { alert("Kamera-Zugriff verweigert."); }
}

async function takePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const status = document.getElementById('status');
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
  status.innerText = "KI analysiert Beleg...";

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [
          { text: "Extrahiere Händler (vendor), Datum (date), Brutto (total), MwSt (tax). Antworte nur als JSON-Objekt ohne Markdown-Formatierung." },
          { inline_data: { mime_type: "image/jpeg", data: base64 } }
        ]}]
      })
    });
    const resData = await response.json();
    const rawText = resData.candidates[0].content.parts[0].text;
    const cleanJson = JSON.parse(rawText.replace(/```json|```/g, ""));
    
    receipts.push(cleanJson);
    localStorage.setItem('dripsi_receipts', JSON.stringify(receipts));
    status.innerText = "Beleg erkannt!";
    setTimeout(() => showView('view-list'), 800);
  } catch (e) {
    status.innerText = "Fehler bei der Erkennung.";
    console.error(e);
  }
}

function render() {
  const list = document.getElementById('receipt-list');
  const taxEl = document.getElementById('total-tax');
  let totalTax = 0;

  list.innerHTML = receipts.length ? receipts.map(r => {
    totalTax += parseFloat(String(r.tax).replace(',','.') || 0);
    return `<div class="receipt-item"><div class="lbl">${r.date || 'Unbekannt'}</div><div style="display:flex;justify-content:space-between"><b>${r.vendor || 'Händler'}</b><span>${r.total} €</span></div></div>`;
  }).join('') : '<div style="color:var(--txt2); font-size:13px;">Noch keine Belege vorhanden.</div>';

  taxEl.innerText = totalTax.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
}

function exportCSV() {
  if(!receipts.length) return alert("Keine Daten zum Exportieren.");
  let csv = "Datum;Haendler;Brutto;MwSt\n" + receipts.map(r => `${r.date};${r.vendor};${r.total};${r.tax}`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Beleg_Export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function clearData() { if(confirm("Alle Daten unwiderruflich löschen?")) { receipts = []; localStorage.clear(); render(); } }

render();
</script>
</body>
</html>
